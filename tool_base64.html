<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Base64 Encoder / Decoder</title>

        <!-- Favicon -->
        <link rel="icon" href="img/faviconLarge.png" type="image/png" sizes="1024x1024">

        <!-- Stylesheets -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
        <link rel="stylesheet" href="styles/style.css">
    </head>

    <body>
        <!-- Nav Bar -->
        <div id="navbar-placeholder" class="fixed-top"></div>

        <div class="container my-5" style="padding-top: 4rem;">
            <header class="text-center mb-5">
                <h1 class="display-4 fw-bold mb-2 text-light">Base64 Encoder / Decoder</h1>
                <p class="text-light">Encode plain text to Base64 or decode Base64 back to plain text. Supports full UTF-8.</p>
            </header>

            <!-- Alert Section -->
            <div id="alert-container" class="alert alert-danger mb-4" style="display: none;">
                <div class="alert-content"></div>
            </div>

            <div class="card shadow-sm mx-auto">
                <div class="card-body p-4">
                    <div class="row g-4">

                        <!-- Input Section -->
                        <div class="col-12">
                            <div class="form-group">
                                <label for="inputText" class="form-label text-light">Input:</label>
                                <textarea id="inputText" class="form-control bg-dark text-light border-secondary" rows="8"
                                    placeholder="Paste text or Base64 here..." style="font-family: monospace; resize: vertical;"></textarea>
                            </div>
                            <div class="mt-3 d-flex flex-wrap gap-2">
                                <button id="encodeBtn" class="btn btn-primary">
                                    <i class="bi bi-lock me-1"></i>Encode to Base64
                                </button>
                                <button id="decodeBtn" class="btn btn-primary">
                                    <i class="bi bi-unlock me-1"></i>Decode from Base64
                                </button>
                                <button id="swapBtn" class="btn btn-outline-secondary" title="Swap input and output">
                                    <i class="bi bi-arrow-down-up me-1"></i>Swap
                                </button>
                                <button id="clearBtn" class="btn btn-outline-danger ms-auto" title="Clear both fields">
                                    <i class="bi bi-trash me-1"></i>Clear
                                </button>
                            </div>
                        </div>

                        <!-- Output Section -->
                        <div class="col-12">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label for="outputText" class="form-label text-light mb-0">Output:</label>
                                <button id="copyBtn" class="btn btn-sm btn-secondary">
                                    <i class="bi bi-clipboard me-1"></i>Copy
                                </button>
                            </div>
                            <textarea id="outputText" class="form-control bg-dark text-light border-secondary" rows="8"
                                readonly placeholder="Result will appear here..." style="font-family: monospace; resize: vertical;"></textarea>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Footer -->
        <div id="footer-placeholder"></div>

        <!-- App Scripts -->
        <script src="scripts/scripts.js"></script>
        <script src="scripts/Tools/Base64/tool_base64.js"></script>

    </body>
</html>
