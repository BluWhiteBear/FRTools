<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Updater Tool</title>

    <link rel="icon" href="img/faviconLarge.png" type="image/png" sizes="1024x1024">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .sql-editor {
            --sql-font-family: Consolas, 'Courier New', monospace;
            --sql-font-size: 0.9rem;
            --sql-line-height: 1.45;
            --sql-letter-spacing: 0;
            position: relative;
            height: 32rem;
            min-height: 32rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 0.375rem;
            background: #212529;
            overflow: hidden;
        }

        .sql-editor.sql-editor-output {
            height: 18rem;
            min-height: 18rem;
        }

        .input-editors-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 14px minmax(0, 1fr);
            gap: 1rem;
            align-items: stretch;
        }

        .input-editor-col {
            min-width: 0;
        }

        .shared-scrollbar-col {
            display: flex;
            align-items: end;
        }

        .shared-scrollbar {
            width: 14px;
            height: 32rem;
            overflow-y: auto;
            overflow-x: hidden;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
        }

        .shared-scrollbar-spacer {
            width: 1px;
            min-height: 1px;
        }

        .shared-scrollbar::-webkit-scrollbar {
            width: 12px;
        }

        .shared-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(200, 223, 143, 0.65);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        .shared-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sql-editor pre,
        .sql-editor textarea {
            margin: 0;
            width: 100%;
            height: 100% !important;
            min-height: 0 !important;
            padding: 0.75rem;
            border-radius: 0;
            border: 0;
            box-sizing: border-box;
            font-family: var(--sql-font-family) !important;
            font-size: var(--sql-font-size) !important;
            line-height: var(--sql-line-height) !important;
            letter-spacing: var(--sql-letter-spacing) !important;
            font-kerning: none;
            font-variant-ligatures: none;
            font-feature-settings: 'liga' 0, 'calt' 0;
            white-space: pre;
            overflow: auto;
            tab-size: 4;
            -moz-tab-size: 4;
        }

        .sql-editor pre {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: transparent;
        }

        .sql-editor pre code {
            display: block;
            min-height: 100%;
            font-family: inherit !important;
            font-size: inherit !important;
            line-height: inherit !important;
            letter-spacing: inherit !important;
            font-kerning: inherit;
            font-variant-ligatures: inherit;
            font-feature-settings: inherit;
        }

        .sql-editor pre code,
        .sql-editor pre code span,
        .sql-editor pre code .token {
            font-family: inherit !important;
            font-size: inherit !important;
            line-height: inherit !important;
            letter-spacing: inherit !important;
            font-kerning: inherit;
            font-variant-ligatures: inherit;
            font-feature-settings: inherit;
        }

        .sql-editor pre code .sql-line {
            display: block;
            width: 100%;
        }

        .sql-editor pre code .sql-line.diff-line-left {
            background: rgba(255, 193, 7, 0.16);
            box-shadow: inset 3px 0 0 rgba(255, 193, 7, 0.65);
        }

        .sql-editor pre code .sql-line.diff-line-right {
            background: rgba(13, 202, 240, 0.16);
            box-shadow: inset 3px 0 0 rgba(13, 202, 240, 0.65);
        }

        .sql-editor textarea {
            position: absolute;
            inset: 0;
            resize: none;
            background: transparent;
            color: transparent;
            caret-color: #f8f9fa;
            -webkit-text-fill-color: transparent;
            text-rendering: geometricPrecision;
            margin-top: 0 !important;
        }

        .sql-editor:focus-within {
            border-color: #c8df8f;
            box-shadow: 0 0 0 0.2rem rgba(200, 223, 143, 0.2);
        }

        .sql-editor textarea::selection {
            background: rgba(200, 223, 143, 0.3);
        }

        .sql-editor.input-sql textarea,
        .sql-editor.input-sql pre {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .sql-editor.input-sql textarea::-webkit-scrollbar,
        .sql-editor.input-sql pre::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .sql-editor textarea::-webkit-scrollbar,
        .sql-editor pre::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .sql-editor textarea::-webkit-scrollbar-thumb,
        .sql-editor pre::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }

        @media (max-width: 767.98px) {
            .input-editors-grid {
                grid-template-columns: 1fr;
            }

            .shared-scrollbar-col {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder" class="fixed-top"></div>

    <div class="container my-5" style="padding-top: 4rem;">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold mb-2">Table Updater</h1>
            <p>Generate ALTER TABLE statements to sync Target Table (Live) to match Source Table (Dev).</p>
        </header>

        <div id="alert-container" class="alert alert-danger mb-4" style="display: none;">
            <div class="alert-content"></div>
        </div>

        <div class="card shadow-sm mx-auto">
            <div class="card-body p-4">
                <div class="input-editors-grid">
                    <div class="input-editor-col">
                        <label for="targetSql1" class="form-label text-light fw-semibold">Source Table (Dev)</label>
                        <div class="sql-editor input-sql">
                            <pre aria-hidden="true"><code id="targetSql1Highlight" class="language-sql"></code></pre>
                            <textarea id="targetSql1" class="form-control" rows="16" spellcheck="false" placeholder="Paste CREATE TABLE script for the Source table (authoritative schema)..."></textarea>
                        </div>
                    </div>
                    <div class="shared-scrollbar-col" aria-hidden="true">
                        <div id="sharedInputScrollbar" class="shared-scrollbar">
                            <div id="sharedInputScrollbarSpacer" class="shared-scrollbar-spacer"></div>
                        </div>
                    </div>
                    <div class="input-editor-col">
                        <label for="targetSql2" class="form-label text-light fw-semibold">Target Table (Live)</label>
                        <div class="sql-editor input-sql">
                            <pre aria-hidden="true"><code id="targetSql2Highlight" class="language-sql"></code></pre>
                            <textarea id="targetSql2" class="form-control" rows="16" spellcheck="false" placeholder="Paste CREATE TABLE script for the Target table to be altered..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="mt-3 d-flex gap-2 flex-wrap">
                    <button id="generateBtn" class="btn btn-primary">Generate Sync SQL</button>
                    <button id="copyBtn" class="btn btn-secondary">Copy Output</button>
                </div>

                <div class="mt-4">
                    <label for="syncOutput" class="form-label text-light fw-semibold">Sync Output (ALTER statements)</label>
                    <div class="sql-editor sql-editor-output">
                        <pre aria-hidden="true"><code id="syncOutputHighlight" class="language-sql"></code></pre>
                        <textarea id="syncOutput" class="form-control" rows="14" readonly spellcheck="false" placeholder="Generated ALTER TABLE statements will appear here..."></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="scripts/scripts.js"></script>
    <script src="scripts/Tools/TableUpdaterTool/tool_tableUpdaterTool.js"></script>
</body>
</html>
